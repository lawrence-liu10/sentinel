[defaults]
inventory = inventory/hosts.yml
remote_user = ubuntu
private_key_file = ../infra/.ssh/sentinel_ed25519
host_key_checking = False
retry_files_enabled = False
collections_path = ./.collections
# Roles live in ansible/roles; make it findable for playbooks run from elsewhere
# (faults/inject.yml, playbooks/*.yml that include_role app_service). Relative to
# cwd, which is always ansible/ (the make targets cd here).
roles_path = ./roles
stdout_callback = default
result_format = yaml

[privilege_escalation]
become = True
become_method = sudo

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
pipelining = True
