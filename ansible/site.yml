# Full provision: hardening + docker + postgres, then the app rollout.
# Run: ansible-playbook site.yml  (uses generated inventory/hosts.yml)
#      ansible-playbook site.yml -e image_tag=v7

- name: Base hardening + swap (all hosts)
  hosts: all
  roles:
    - base

# mon-1 also runs containers (the LGTM stack), so it needs Docker too.
- name: Docker engine (container hosts)
  hosts: app:db:monitoring
  roles:
    - docker

- name: Postgres + pgvector (db-1)
  hosts: db
  vars:
    pg_password: >-
      {{ lookup('amazon.aws.aws_ssm', '/sentinel/pg_password',
      region=aws_region) }}
  roles:
    - postgres

- name: App services
  ansible.builtin.import_playbook: deploy.yml

- name: Observability stack (LGTM)
  ansible.builtin.import_playbook: observability.yml

# Steady background traffic so rate/latency alerts have a baseline to fire
# against. Runs last: the app + gateway must be up for /checkout to succeed.
- name: Background load generator (ctrl-1)
  hosts: control
  roles:
    - loadgen
