# Alertmanager routing. Grouping/timing per contract §7. The webhook receiver to
# the Sentinel agent is wired in a later phase; for now alerts route to a sink.
route:
  group_by: ["alertname", "service"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "null"

receivers:
  - name: "null"
