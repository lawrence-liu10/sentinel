# Sentinel alert rules — the five names are a CONTRACT (contracts §6); evals
# score against them, so don't rename casually. `for:` windows are kept short
# (demo speed over flappiness — see the writeup).
#
# cAdvisor v0.55.1 on cgroup v2 exposes no usable restart or OOM-event counter
# (verified live 2026-07-20): container_oom_events_total stays 0, and
# changes(container_start_time_seconds[...]) misses Docker backoff-restarts. So
# the two container alerts detect the consequence on signals that do work — a
# down scrape target (ContainerRestartLoop) and working-set-vs-limit pressure
# (ContainerOOMKilled). See contracts §6.
# `for:` windows still want a live fault→fire timing pass in Phase 3.
groups:
  - name: sentinel
    rules:
      - alert: HighLatencyP95
        expr: >-
          histogram_quantile(0.95, sum by (le) (rate(
          http_request_duration_seconds_bucket{service="api-gateway"}[5m]))) > 1
        for: 1m
        labels:
          service: api-gateway
          severity: warning
        annotations:
          summary: "api-gateway p95 latency above 1s"
          description: "95th-pct request duration on api-gateway exceeded 1s."

      - alert: HighErrorRate
        expr: >-
          rate(http_requests_total{status=~"5..",service="api-gateway"}[5m])
          / rate(http_requests_total{service="api-gateway"}[5m]) > 0.2
        for: 1m
        labels:
          service: api-gateway
          severity: critical
        annotations:
          summary: "api-gateway 5xx ratio above 20%"
          description: "More than 20% of api-gateway responses are 5xx."

      - alert: ContainerRestartLoop
        # A crash-looping service never boots far enough to serve /metrics, so
        # its scrape target is DOWN. cAdvisor's restart signals don't survive
        # Docker backoff-restarts (see header), so detect the down target
        # instead. No static service label — let the target's own `service`
        # flow through so the agent knows which service to roll back.
        expr: up{job="services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "A sentinel service is down (crash-looping)"
          description: >-
            {{ $labels.service }} scrape target down for 2m
            (crash-loop / failed boot).

      - alert: ContainerOOMKilled
        # cAdvisor's OOM counter is stuck at 0 on cgroup v2 (see header), so
        # detect the memory pressure instead: working set near the container's
        # limit. `> 0` drops unlimited containers (limit 0 ⇒ divide-by-zero).
        expr: >-
          container_memory_working_set_bytes{name=~"sentinel-.*"}
          / (container_spec_memory_limit_bytes{name=~"sentinel-.*"} > 0) > 0.8
        for: 1m
        labels:
          service: checkout-worker
          severity: critical
        annotations:
          summary: "A sentinel container is at its memory limit"
          description: >-
            {{ $labels.name }} working set above 80% of its memory limit.

      - alert: PostgresConnExhaustion
        # pg_stat_activity_count is per-{datname,state}; sum it and match the
        # single max_connections series on instance (a bare `/` finds no common
        # label set and yields nothing — it never fired).
        expr: >-
          sum by (instance) (pg_stat_activity_count)
          / on (instance) pg_settings_max_connections > 0.9
        for: 1m
        labels:
          service: orders-service
          severity: critical
        annotations:
          summary: "Postgres connection pool near exhaustion"
          description: "Active connections above 90% of max_connections."
