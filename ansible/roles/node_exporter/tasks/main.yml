# node_exporter runs as a plain systemd binary (not a container) — a host-level
# service is realistic, and it must keep reporting even if Docker itself wedges.
- name: Create node_exporter system user
  become: true
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Install node_exporter binary
  become: true
  ansible.builtin.unarchive:
    src: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{
      node_exporter_version }}/node_exporter-{{ node_exporter_version
      }}.linux-amd64.tar.gz
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - --strip-components=1
      - --wildcards
      - "*/node_exporter"
    owner: root
    group: root
    mode: "0755"
    creates: /usr/local/bin/node_exporter

- name: Install node_exporter systemd unit
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus node_exporter
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      ExecStart=/usr/local/bin/node_exporter --web.listen-address=:9100
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  notify: Restart node_exporter

- name: Enable and start node_exporter
  become: true
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
