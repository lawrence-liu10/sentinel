# App rollout only (base/docker/postgres already provisioned by site.yml).
# Per-service config (host, port, memory, env) is canonical in group_vars
# (the `services` map), so this deploy and every remediation playbook that
# redeploys a service share one source of truth — no drift between them.
# Inter-service URLs use each target's PRIVATE ip + published host port because
# the calls cross hosts (app-1 <-> app-2 <-> db-1).

- name: Deploy app services
  hosts: app
  tasks:
    - name: "Deploy {{ item.key }}"
      when: item.value.host == inventory_hostname
      ansible.builtin.include_role:
        name: app_service
      vars:
        app_name: "{{ item.key }}"
        app_host_port: "{{ item.value.port }}"
        app_memory: "{{ item.value.memory | default('') }}"
        app_env: "{{ item.value.env }}"
      loop: "{{ services | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

# Record the rollout — this is what the agent's list_recent_deploys reads.
- name: Record deploys
  hosts: db
  tasks:
    - name: Insert a deploys row per service
      become: true
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ postgres_container }}"
          - psql
          - -U
          - "{{ postgres_user }}"
          - -d
          - "{{ postgres_db }}"
          - -c
          - >-
            INSERT INTO deploys (service, tag, actor)
            VALUES ('{{ item }}', '{{ image_tag }}', 'ansible')
      loop: "{{ services.keys() | list }}"
      changed_when: true
