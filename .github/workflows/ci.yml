name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: fmt
        run: terraform fmt -check -recursive
      - name: validate bootstrap
        working-directory: infra/bootstrap
        run: |
          terraform init -backend=false
          terraform validate
      - name: validate main
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # These dirs hold only .gitkeep in Phase 0; ruff/yamllint exit 0 when they
      # find no matching files, so "tolerate empty" needs no special handling.
      - name: ruff
        run: uvx ruff check agent/ app/ evals/
      - name: yamllint
        run: |
          python -m pip install --quiet yamllint
          yamllint ansible/
